<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ottico Rubini - Chieri</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=PT+Serif:ital@1&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Impostazioni generali */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #382b26; /* Marrone scuro originale dello sfondo */
            color: #f2eadb; /* Testo colore sabbia schiarito per la parte scura */
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }

        /* SEZIONE SABBIA SUPERIORE (Parte Chiara) */
        .top-section {
            background-color: #f2eadb; /* Nuovo colore sabbia schiarito del 10% */
            color: #382b26; /* Testo marrone dello stesso colore dello sfondo inferiore */
            padding: 50px 20px 15px;
            text-align: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-container svg {
            width: 60px;
            height: auto;
            fill: none;
            stroke: #382b26; /* Occhiali marrone scuro */
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .ottico-text {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            letter-spacing: 1px;
            text-transform: lowercase;
            font-weight: 500;
            color: #382b26; /* Scritta "ottico" marrone scuro */
        }

        /* SEZIONE MARRONE INFERIORE */
        .mid-section {
            background-color: #382b26;
            text-align: center;
            padding: 5px 20px 30px;
            border-top: 2px solid #382b26;
        }

        .rubini-text {
            font-family: 'Oswald', sans-serif;
            font-size: 52px;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 400;
            line-height: 1.1;
            color: #f2eadb; /* Nome "RUBINI" colore sabbia */
        }

        .dal-text {
            font-family: 'PT Serif', serif;
            font-style: italic;
            font-size: 18px;
            color: #f2eadb; /* "dal 1990" colore sabbia */
            margin-top: 0px;
            margin-bottom: 0;
        }

        /* SEZIONE CONTATTI */
        .contact-section {
            padding: 20px 25px 40px;
            background-color: #382b26;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(242, 234, 219, 0.15); /* Linea di separazione colore sabbia sfumato */
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .icon-box {
            width: 30px;
            display: flex;
            justify-content: flex-start;
            color: #f2eadb; /* Icone dei contatti colore sabbia */
        }

        .icon-box svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .contact-text {
            flex: 1;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.4;
            color: #f2eadb; /* Testi dei contatti colore sabbia */
        }

        .address-bold {
            font-weight: 500;
            text-transform: uppercase;
            font-size: 15px;
        }

        /* SOCIAL BAR (LOGHI COLORATI) */
        .social-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff; /* Icone bianche per contrastare sui colori dei brand */
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .social-btn:active { transform: scale(0.95); }
        .social-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* Colori specifici richiesti per Instagram e Facebook */
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .btn-facebook {
            background-color: #1877F2;
        }

        /* PULSANTE VCF (Invertito: Sfondo Sabbia, Testo Marrone) */
        .btn-vcf {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f2eadb; /* Sfondo sabbia della stessa tinta superiore */
            color: #382b26; /* Testo marrone della stessa tinta inferiore */
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-vcf:active { transform: scale(0.97); }
        .btn-vcf svg { width: 20px; height: 20px; margin-right: 10px; fill: currentColor; }
    </style>
</head>
