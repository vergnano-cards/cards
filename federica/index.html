<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorsHollywood</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        /* Impostazioni di base per mobile verticale */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #EFEFEF; /* Colore carta leggermente grigio/caldo */
            color: #222;
            height: 100%;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
        }

        /* Contenitore principale a forma di schermata mobile */
        .container {
            width: 100%;
            max-width: 450px;
            background-color: #EAE8E8;
            background-image: radial-gradient(#d7d7d7 1px, transparent 0);
            background-size: 40px 40px; /* Leggera texture per richiamare la carta */
            min-height: 100vh;
            padding: 40px 25px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Stile Titolo "Macchina da scrivere" */
        .brand-name {
            font-family: 'Special Elite', cursive;
            font-size: 32px;
            font-weight: normal;
            letter-spacing: -1px;
            color: #1a1a1a;
            margin-top: 20px;
            margin-bottom: 25px;
        }

        /* I 5 quadrati di colore */
        .color-blocks {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 30px;
        }

        .block {
            width: 32px;
            height: 32px;
        }

        .bg-yellow { background-color: #D6B21A; }
        .bg-green  { background-color: #458235; }
        .bg-purple { background-color: #4A245C; }
        .bg-red    { background-color: #A81C26; }
        .bg-blue   { background-color: #1F3361; }

        /* Scritte in Corsivo Cremisi */
        .script-text {
            font-family: 'Dancing Script', cursive;
            color: #9b1931;
            font-size: 28px;
            margin-bottom: 40px;
        }
        
        .thank-you {
            font-family: 'Dancing Script', cursive;
            color: #9b1931;
            font-size: 42px;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        /* Linea di separazione */
        .divider {
            width: 60%;
            height: 1px;
            background-color: #ccc;
            margin: 10px auto 30px;
        }

        /* Stile Pulsanti per le Azioni */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn svg {
            width: 22px;
            height: 22px;
            margin-right: 12px;
        }

        /* Colori specifici per i pulsanti */
        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }

        .btn-email {
            background-color: #1a1a1a;
            color: white;
        }

        .btn-vcf {
            background-color: white;
            color: #1a1a1a;
            border: 1px solid #ddd;
        }

        /* Stile per l'indirizzo email testuale */
        .email-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="brand-name">ColorsHollywood</div>

        <div class="color-blocks">
            <div class="block bg-yellow"></div>
            <div class="block bg-green"></div>
            <div class="block bg-purple"></div>
            <div class="block bg-red"></div>
            <div class="block bg-blue"></div>
        </div>

        <div class="script-text">handmade in Italy for you</div>

        <div class="divider"></div>

        <div class="thank-you">Thank you</div>
        
        <div class="email-text">colorshollywood@gmail.com</div>

    </div>

</body>
</html>
