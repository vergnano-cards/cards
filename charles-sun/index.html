    <title>Business Card - Charles Sun (孙亚军)</title>
    <style>
        /* CSS RESET & BASICS */
        body, html { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #F4F6F8; color: #333; height: 100%; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; }

        /* HEADER AREA */
        .header { background-color: #2c3e50; color: white; text-align: center; padding: 40px 20px 30px; }
        
        /* NUOVO STILE PER IL LOGO */
        .logo { 
            max-width: 180px; 
            height: auto; 
            margin-bottom: 20px; 
        }
        
        .name { font-size: 26px; font-weight: 600; margin: 0; letter-spacing: 0.5px; }
        .name-zh { font-size: 20px; font-weight: 400; margin-top: 5px; color: #bdc3c7; }
        .subtitle { font-size: 15px; opacity: 0.9; margin-top: 15px; font-weight: 500; }
        .subtitle-zh { font-size: 14px; opacity: 0.7; margin-top: 4px; }

        /* ACTION BAR (PULSANTI RAPIDI) */
        .action-bar { background-color: #1a252f; display: flex; text-align: center; color: rgba(255,255,255,0.9); border-top: 1px solid rgba(255,255,255,0.1); }
        .action-item { flex: 1; padding: 15px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-right: 1px solid rgba(255,255,255,0.1); }
        .action-item:last-child { border-right: none; }
        .action-item i { font-size: 22px; display: block; margin-bottom: 5px; opacity: 1; color: white; }

        /* DETAILS SECTION (INFO) */
        .details { background-color: white; padding: 20px 20px 100px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .detail-item { display: flex; align-items: flex-start; padding: 15px 0; border-bottom: 1px solid #EEEEEE; position: relative; }
        .detail-item:last-child { border-bottom: none; }
        .icon-area { width: 40px; color: #2c3e50; font-size: 20px; padding-top: 2px; }
        .text-area { flex: 1; }
        .main-text { font-size: 16px; font-weight: 500; color: #212121; margin-bottom: 3px; }
        .sub-text { font-size: 14px; color: #666; margin-bottom: 3px; }
        .label-text { font-size: 13px; color: #888; margin-top: 5px; }
        
        /* PULSANTE "MOSTRA SU MAPPA" */
        .map-link { color: #3498db; font-weight: 600; font-size: 14px; text-transform: uppercase; margin-top: 10px; display: inline-block; cursor: pointer; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: #3498db; border-radius: 50%; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.4); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.2s; z-index: 100; }
        .fab:active { transform: scale(0.95); }
        
        /* ICONS DELLO SCHERMO ORIGINALE */
        .icon { display: inline-block; width: 24px; height: 24px; background-size: contain; background-repeat: no-repeat; background-position: center; }

        .ic-phone-gray { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 96 960 960" width="24"><path d="M797 976q-113 0-224.5-56T371 782Q260 671 204 559.5T148 371q0-35 22.5-57.5T228 291h136q30 0 52 19.5t26 48.5l22 136q4 29-2.5 53.5T438 590L336 692q48 76 109 137t137 109l102-102q21-21 45.5-27.5T783 608l136 22q29 4 48.5 26t19.5 52v136q0 35-22.5 57.5T797 976Z"/></svg>'); opacity: 0.5; }
